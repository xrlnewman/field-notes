<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>文件批量改名</title>
  <link rel="stylesheet" href="../../common.css" />
</head>
<body>
  <h1>文件批量改名</h1>
  <div class="subtitle">正则替换 / Excel 映射 / 序号/日期前缀</div>

  <div class="tabs">
    <button class="tab active" data-tab="regex">正则替换</button>
    <button class="tab" data-tab="mapping">Excel 映射</button>
    <button class="tab" data-tab="pattern">序号/日期模板</button>
  </div>

  <div class="card">
    <div class="row">
      <label>源目录</label>
      <button id="pick-dir">选目录</button>
      <span id="dir-name" class="muted">未选择</span>
      <label style="margin-left:auto"><input id="recursive" type="checkbox" /> 含子目录</label>
    </div>
    <div class="kpis" style="margin-top:8px">
      <div class="kpi"><div class="label">扫描文件数</div><div class="value" id="kpi-total">0</div></div>
      <div class="kpi"><div class="label">预览匹配数</div><div class="value" id="kpi-matched">0</div></div>
    </div>
  </div>

  <!-- regex -->
  <section class="tab-panel active" data-panel="regex">
    <div class="card">
      <div class="row">
        <label>查找正则</label>
        <input id="r-find" type="text" placeholder="如 ^IMG_(\d+)" style="flex:1" />
        <label><input id="r-ci" type="checkbox" checked /> 忽略大小写</label>
      </div>
      <div class="row">
        <label>替换为</label>
        <input id="r-repl" type="text" placeholder="如 photo_$1（支持 $1 反向引用）" style="flex:1" />
      </div>
      <div class="row">
        <label><input id="r-keep-ext" type="checkbox" checked /> 保留扩展名（只匹配主名）</label>
      </div>
    </div>
  </section>

  <!-- mapping -->
  <section class="tab-panel" data-panel="mapping">
    <div class="card">
      <div class="row">
        <label>映射 Excel</label>
        <button id="m-pick">选 Excel</button>
        <span id="m-file" class="muted">未选择</span>
      </div>
      <div class="row">
        <label>旧名列</label><select id="m-col-old" style="min-width:160px"></select>
        <label>新名列</label><select id="m-col-new" style="min-width:160px"></select>
      </div>
      <div class="muted">说明：Excel 中"旧名"匹配文件名（含扩展名），找到就替换为"新名"</div>
    </div>
  </section>

  <!-- pattern -->
  <section class="tab-panel" data-panel="pattern">
    <div class="card">
      <div class="row">
        <label>命名模板</label>
        <input id="p-template" type="text" placeholder="如 {date}_{n}_{name}" style="flex:1" value="{n}_{name}" />
      </div>
      <div class="muted">
        支持占位符：<b>{n}</b> 序号（从1）、<b>{n:3}</b> 3 位补零、<b>{name}</b> 原主名、<b>{ext}</b> 扩展名、
        <b>{date}</b> 今日 YYYYMMDD、<b>{datetime}</b> YYYYMMDD-HHmm、<b>{mdate}</b> 文件修改日期
      </div>
    </div>
  </section>

  <div class="card" style="margin-top:14px">
    <div class="toolbar">
      <button id="preview-btn">生成预览</button>
      <button id="apply-btn" class="danger">应用（执行重命名）</button>
    </div>
    <div class="table-wrap">
      <table id="preview-table"><thead><tr><th>旧名</th><th>新名</th><th>状态</th></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <div id="log" class="log" style="margin-top:14px">就绪</div>

  <script src="../../../node_modules/xlsx/dist/xlsx.full.min.js"></script>
  <script src="../../tool-api-bridge.js"></script>
  <script src="tool.js"></script>
</body>
</html>
